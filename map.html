<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Food Vulnerability Map</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #080c14;
            overflow: hidden;
            font-family: 'IBM Plex Mono', monospace;
        }

        #map { position: absolute; inset: 0; }

        /* ── Layer toggle panel ── */
        .toggle-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(8,12,20,0.92);
            border: 1px solid rgba(232,228,220,0.1);
            padding: 10px 0 6px;
            min-width: 190px;
        }

        .toggle-panel-title {
            font-size: 0.5rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(232,228,220,0.25);
            margin-bottom: 6px;
            padding: 0 14px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 14px;
            cursor: pointer;
            user-select: none;
            border-left: 2px solid transparent;
            transition: border-color 0.2s, background 0.2s;
        }

        .toggle-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            opacity: 0.2;
            transition: opacity 0.2s;
        }

        .toggle-row.active .toggle-dot { opacity: 0; width: 0; gap: 0; }

        .toggle-label {
            font-size: 0.58rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(232,228,220,0.3);
            transition: color 0.2s;
        }

        .toggle-row.active .toggle-label { color: rgba(232,228,220,0.8); }

        /* ── Tooltip ── */
        .tooltip {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 20;
            background: rgba(8,12,20,0.97);
            border: 1px solid rgba(232,228,220,0.1);
            padding: 8px 12px;
            max-width: 220px;
        }

        .tooltip-title {
            font-size: 0.58rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #e8e4dc;
            margin-bottom: 4px;
        }

        .tooltip-body {
            font-size: 0.56rem;
            line-height: 1.6;
            color: rgba(232,228,220,0.45);
            white-space: pre-line;
        }

        .mapboxgl-ctrl-attrib {
            font-family: 'IBM Plex Mono', monospace !important;
            font-size: 0.5rem !important;
            background: rgba(8,12,20,0.7) !important;
        }
        .mapboxgl-ctrl-logo { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Layer toggle panel -->
<div class="toggle-panel">
    <div class="toggle-panel-title">Layers</div>
    <div class="toggle-row" data-layer="supply-gap" data-color="#c44b2b">
        <div class="toggle-dot" style="background:#c44b2b"></div>
        <span class="toggle-label">Supply Gap</span>
    </div>
    <div class="toggle-row" data-layer="heat" data-color="#e8832a">
        <div class="toggle-dot" style="background:#e8832a"></div>
        <span class="toggle-label">Heat Vulnerability</span>
    </div>
    <div class="toggle-row" data-layer="food-sites" data-color="#e879a0">
        <div class="toggle-dot" style="background:#e879a0"></div>
        <span class="toggle-label">Emergency Food</span>
    </div>
    <div id="food-sites-legend" style="display:none; padding: 4px 14px 6px 16px; gap: 5px; flex-direction:column;">
        <div style="display:flex; align-items:center; gap:7px;">
            <div style="width:7px; height:7px; border-radius:50%; background:#e879a0; flex-shrink:0;"></div>
            <span style="font-size:0.5rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(232,228,220,0.45);">Food Pantry</span>
        </div>
        <div style="display:flex; align-items:center; gap:7px;">
            <div style="width:7px; height:7px; border-radius:50%; background:#e84a6a; flex-shrink:0;"></div>
            <span style="font-size:0.5rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(232,228,220,0.45);">Food Pantry — Kosher</span>
        </div>
        <div style="display:flex; align-items:center; gap:7px;">
            <div style="width:7px; height:7px; border-radius:50%; background:#ff9944; flex-shrink:0;"></div>
            <span style="font-size:0.5rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(232,228,220,0.45);">Food Pantry — Mobile</span>
        </div>
        <div style="display:flex; align-items:center; gap:7px;">
            <div style="width:7px; height:7px; border-radius:50%; background:#9b59b6; flex-shrink:0;"></div>
            <span style="font-size:0.5rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(232,228,220,0.45);">Soup Kitchen</span>
        </div>
    </div>
    <div class="toggle-row" data-layer="fresh" data-color="#3a6ea8">
        <div class="toggle-dot" style="background:#3a6ea8"></div>
        <span class="toggle-label">FRESH Zoning</span>
    </div>
    <div id="fresh-legend" style="display:none; padding: 4px 14px 6px 16px; gap: 5px; flex-direction:column;">
        <div style="display:flex; align-items:center; gap:7px;">
            <div style="width:18px; height:8px; background:#5ab0e8; flex-shrink:0; opacity:0.65;"></div>
            <span style="font-size:0.5rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(232,228,220,0.45);">Zoning</span>
        </div>
        <div style="display:flex; align-items:center; gap:7px;">
            <div style="width:18px; height:8px; background:#3a6ea8; flex-shrink:0; opacity:0.65;"></div>
            <span style="font-size:0.5rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(232,228,220,0.45);">Tax Incentives</span>
        </div>
        <div style="display:flex; align-items:center; gap:7px;">
            <div style="width:18px; height:8px; background:#1a4a7a; flex-shrink:0; opacity:0.65;"></div>
            <span style="font-size:0.5rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(232,228,220,0.45);">Zoning + Tax</span>
        </div>
    </div>
    <div class="toggle-row" data-layer="trucks" data-color="#48b06e">
        <div class="toggle-dot" style="background:#48b06e"></div>
        <span class="toggle-label">Truck Routes</span>
    </div>
    <div id="trucks-legend" style="display:none; padding: 4px 14px 6px 16px; gap: 5px; flex-direction:column;">
        <div style="display:flex; align-items:center; gap:7px;">
            <div style="width:18px; height:2px; background:#48b06e; flex-shrink:0;"></div>
            <span style="font-size:0.5rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(232,228,220,0.45);">Through</span>
        </div>
        <div style="display:flex; align-items:center; gap:7px;">
            <div style="width:18px; height:2px; background:#e8c84a; flex-shrink:0;"></div>
            <span style="font-size:0.5rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(232,228,220,0.45);">Local</span>
        </div>
        <div style="display:flex; align-items:center; gap:7px;">
            <div style="width:18px; height:2px; background:#e8832a; flex-shrink:0;"></div>
            <span style="font-size:0.5rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(232,228,220,0.45);">Limited Local</span>
        </div>
    </div>
    <div class="toggle-row" data-layer="flood" data-color="#2a4a8a">
        <div class="toggle-dot" style="background:#2a4a8a"></div>
        <span class="toggle-label">Flood Risk</span>
    </div>
    <div style="padding: 0 14px; margin-top: 10px; font-size: 0.5rem; color: rgba(232,228,220,0.2); font-family: 'IBM Plex Mono', monospace;">// select a layer to explore</div>
</div>

<!-- Hover tooltip -->
<div class="tooltip" id="tooltip">
    <div class="tooltip-title" id="tooltip-title"></div>
    <div class="tooltip-body"  id="tooltip-body"></div>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoic3VubmlodSIsImEiOiJjbWxwZmh6NDAxY200M2dvb2VlMzZ2aTM4In0.Xq6Z1l7EMA4II91mAAhyTw';

// ── Layer state ───────────────────────────────────────────────────
const state = {
    'supply-gap': true,
    'heat':       false,
    'food-sites': false,
    'fresh':      false,
    'trucks':     false,
    'flood':      false,
};

const LAYER_IDS = {
    'supply-gap': ['supply-gap-fill'],
    'heat':       ['heat-fill'],
    'food-sites': ['food-sites-circle'],
    'fresh':      ['fresh-fill'],
    'trucks':     ['trucks-line'],
    'flood':      ['flood-fill'],
};

// ── Tooltip formatters ─────────────────────────────────────────────
const HOVER = {
    'supply-gap-fill':   p => ({
        title: p.nta_name || 'NTA',
        body:  `Supply gap: ${p.supply_gap_lbs || '—'}\nFood insecure: ${p.food_insecure_percentage || '—'}`,
    }),
    'heat-fill':         p => ({
        title: `ZIP ${p.zip}`,
        body:  `Heat Vulnerability Index: ${p.hvi} / 5`,
    }),
    'food-sites-circle': p => {
        const typeLabels = {
            'FP':   'Food Pantry',
            'FPH':  'Food Pantry — Home Delivery',
            'FPHA': 'Food Pantry — Home Delivery (Appt.)',
            'FPK':  'Food Pantry — Kosher',
            'FPM':  'Food Pantry — Mobile',
            'FPV':  'Food Pantry — Various Locations',
            'SK':   'Soup Kitchen',
            'SKK':  'Soup Kitchen — Kosher',
            'SKM':  'Soup Kitchen — Mobile',
        };
        return {
            title: p.org_name || 'Food Site',
            body:  [typeLabels[p.type] || p.type, p.days, p.hours].filter(Boolean).join('\n'),
        };
    },
    'fresh-fill':        p => ({
        title: 'FRESH Zone',
        body:  p.name || '—',
    }),
    'trucks-line':       p => ({
        title: p.street || 'Truck Route',
        body:  [p.routetype, p.boroname].filter(Boolean).join('\n'),
    }),
    'flood-fill':        p => ({
        title: 'Flood Risk',
        body:  `Category ${p.Flooding_Category || '—'}`,
    }),
};

// ── Map init ───────────────────────────────────────────────────────
const map = new mapboxgl.Map({
    container: 'map',
    style:     'mapbox://styles/mapbox/dark-v11',
    bounds:    [[-74.25, 40.48], [-73.68, 40.92]],
    fitBoundsOptions: { padding: 30 },
});


map.on('load', async () => {

    const FILES = {
        'supply-gap': 'data/nta_supply_gap_2024.geojson',
        'heat':       'data/Heat_Vulnerability_Index_Rankings_20260216.geojson',
        'food-sites': 'data/cfc_food_sites.geojson',
        'fresh':      'data/nyc-fresh-zoining.geojson',
        'trucks':     'data/nyc-truck-routes-2026.geojson',
        'flood':      'data/stormwater-flood.geojson',
    };

    await Promise.all(
        Object.entries(FILES).map(async ([key, path]) => {
            const res  = await fetch(path);
            const data = await res.json();
            if (key === 'supply-gap' && data.features?.length) {
                console.log('[supply-gap] first feature properties:', data.features[0].properties);
            }
            map.addSource(key, { type: 'geojson', data });
        })
    );

    // Supply Gap — choropleth fill (log_gap range 4.118–6.631)
    map.addLayer({
        id:     'supply-gap-fill',
        type:   'fill',
        source: 'supply-gap',
        paint:  {
            'fill-color': [
                'interpolate', ['linear'], ['get', 'log_gap'],
                4.118, 'rgba(8,12,20,0)',
                4.872, 'rgba(80,20,15,0.4)',
                5.626, 'rgba(150,40,25,0.7)',
                6.631, 'rgba(196,75,43,0.95)',
            ],
            'fill-opacity': 1,
        },
        layout: { visibility: 'none' },
    });

    // Heat Vulnerability — fill (hvi 1–5)
    map.addLayer({
        id:     'heat-fill',
        type:   'fill',
        source: 'heat',
        paint:  {
            'fill-color': [
                'interpolate', ['linear'], ['get', 'hvi'],
                1, '#1a1a2e',
                3, '#a0561a',
                5, '#e8832a',
            ],
            'fill-opacity': 0.7,
        },
        layout: { visibility: 'none' },
    });

    // Emergency Food — circles, colored by type group
    map.addLayer({
        id:     'food-sites-circle',
        type:   'circle',
        source: 'food-sites',
        paint:  {
            'circle-color': [
                'match', ['get', 'type'],
                'FP',   '#e879a0',
                'FPH',  '#e879a0',
                'FPHA', '#e879a0',
                'FPV',  '#e879a0',
                'FPK',  '#e84a6a',
                'FPM',  '#ff9944',
                'SK',   '#9b59b6',
                'SKK',  '#9b59b6',
                'SKM',  '#9b59b6',
                '#888'
            ],
            'circle-radius':       5,
            'circle-opacity':      0.85,
            'circle-stroke-color': 'rgba(232,228,220,0.15)',
            'circle-stroke-width': 1,
        },
        layout: { visibility: 'none' },
    });

    // FRESH Zoning — fill, colored by incentive type
    map.addLayer({
        id:     'fresh-fill',
        type:   'fill',
        source: 'fresh',
        paint:  {
            'fill-color': [
                'match', ['get', 'name'],
                'Zoning incentives',                          '#5ab0e8',
                'Discretionary tax incentives',               '#3a6ea8',
                'Zoning and discretionary tax incentives',    '#1a4a7a',
                '#3a6ea8'
            ],
            'fill-opacity': 0.65,
        },
        layout: { visibility: 'none' },
    });

    // Truck Routes — line, colored by routetype
    map.addLayer({
        id:     'trucks-line',
        type:   'line',
        source: 'trucks',
        paint:  {
            'line-color': [
                'match', ['get', 'routetype'],
                'Through',       '#48b06e',
                'Local',         '#e8c84a',
                'Limited Local', '#e8832a',
                '#888'
            ],
            'line-width':   1.5,
            'line-opacity': 0.75,
        },
        layout: { visibility: 'none' },
    });

    // Flood Risk — fill
    map.addLayer({
        id:     'flood-fill',
        type:   'fill',
        source: 'flood',
        paint:  {
            'fill-color': [
                'interpolate', ['linear'], ['get', 'flood_score'],
                1, '#1e3060',
                2, '#2a4a8a',
            ],
            'fill-opacity': 0.55,
        },
        layout: { visibility: 'none' },
    });

    // ── Hover tooltips ─────────────────────────────────────────────
    const tooltip      = document.getElementById('tooltip');
    const tooltipTitle = document.getElementById('tooltip-title');
    const tooltipBody  = document.getElementById('tooltip-body');
    const mapEl        = document.getElementById('map');

    Object.entries(HOVER).forEach(([layerId, fmt]) => {
        map.on('mousemove', layerId, e => {
            if (!e.features.length) return;
            const { title, body } = fmt(e.features[0].properties);
            tooltipTitle.textContent = title;
            tooltipBody.textContent  = body;
            tooltip.style.opacity    = '1';

            const rect = mapEl.getBoundingClientRect();
            const x    = e.originalEvent.clientX - rect.left + 14;
            const y    = e.originalEvent.clientY - rect.top  - 48;
            tooltip.style.left = Math.min(x, rect.width - 240) + 'px';
            tooltip.style.top  = Math.max(y, 6)                + 'px';
            map.getCanvas().style.cursor = 'crosshair';
        });

        map.on('mouseleave', layerId, () => {
            tooltip.style.opacity = '0';
            map.getCanvas().style.cursor = '';
        });
    });

    // apply default on state
    setLayer('supply-gap', true);
    syncTogglePanel();
});

// ── Layer helpers ──────────────────────────────────────────────────
function setLayer(key, on) {
    state[key] = on;
    (LAYER_IDS[key] || []).forEach(id => {
        if (map.getLayer(id)) {
            map.setLayoutProperty(id, 'visibility', on ? 'visible' : 'none');
        }
    });
}

function syncTogglePanel() {
    document.querySelectorAll('.toggle-row').forEach(row => {
        const on    = !!state[row.dataset.layer];
        const color = row.dataset.color;
        row.classList.toggle('active', on);
        row.style.borderLeftColor = on ? color : 'transparent';
    });
    document.getElementById('trucks-legend').style.display     = state['trucks']     ? 'flex' : 'none';
    document.getElementById('food-sites-legend').style.display = state['food-sites'] ? 'flex' : 'none';
    document.getElementById('fresh-legend').style.display      = state['fresh']      ? 'flex' : 'none';
}

// ── Toggle panel clicks ────────────────────────────────────────────
document.querySelectorAll('.toggle-row').forEach(row => {
    row.addEventListener('click', () => {
        setLayer(row.dataset.layer, !state[row.dataset.layer]);
        syncTogglePanel();
    });
});
</script>
</body>
</html>
