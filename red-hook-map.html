<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #080c14;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #map { width: 100%; height: 100%; }

    /* ── Toggle controls ─────────────────────────────── */
    #controls {
      position: fixed;
      bottom: 2rem;
      left: 1.5rem;
      background: rgba(8,12,20,0.92);
      border: 1px solid rgba(232,228,220,0.12);
      padding: 1rem 1.2rem;
      z-index: 10;
    }
    .group-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(232,228,220,0.3);
      margin-bottom: 0.5rem;
    }
    .group-sep {
      border-top: 1px solid rgba(232,228,220,0.08);
      margin: 0.7rem 0 0.5rem;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: crosshair;
      margin-bottom: 0.5rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232,228,220,0.9);
      user-select: none;
      transition: color 0.2s;
    }
    .toggle-row:last-child { margin-bottom: 0; }
    .toggle-row.inactive   { color: rgba(232,228,220,0.3); }
    .sq {
      width: 8px;
      height: 8px;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .toggle-row.inactive .sq { opacity: 0.2; }

    /* ── Tooltip ─────────────────────────────────────── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      font-family: 'IBM Plex Mono', monospace;
      background: rgba(8,12,20,0.97);
      border: 1px solid rgba(232,228,220,0.1);
      padding: 8px 12px;
      z-index: 30;
      max-width: 220px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .tip-title {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #e8e4dc;
      margin-bottom: 4px;
    }
    .tip-body {
      font-size: 0.56rem;
      line-height: 1.6;
      color: rgba(232,228,220,0.45);
    }

  </style>
</head>
<body>

  <div id="map"></div>
  <div id="tooltip">
    <div class="tip-title" id="tip-title"></div>
    <div class="tip-body"  id="tip-body"></div>
  </div>

  <div id="controls">
    <div class="group-label">Flood</div>
    <div class="toggle-row" data-key="sandy">
      <div class="sq" style="background:#4A7FA8;"></div>Sandy Inundation
    </div>
    <div class="toggle-row" data-key="flood">
      <div class="sq" style="background:#3A5F8A;"></div>Floodplain 2050s
    </div>
    <div class="group-sep"></div>
    <div class="group-label">Land Use</div>
    <div class="toggle-row" data-key="industrial">
      <div class="sq" style="background:#8B3A2B;"></div>Industrial
    </div>
    <div class="toggle-row" data-key="residential">
      <div class="sq" style="background:#8B7B2B;"></div>Residential
    </div>
    <div class="toggle-row" data-key="commercial">
      <div class="sq" style="background:#5B3A8B;"></div>Commercial
    </div>
  </div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoic3VubmlodSIsImEiOiJjbWxwZmh6NDAxY200M2dvb2VlMzZ2aTM4In0.Xq6Z1l7EMA4II91mAAhyTw';

    const map = new mapboxgl.Map({
      container: 'map',
      style:     'mapbox://styles/mapbox/dark-v11',
      center:    [-74.0030, 40.6791],
      zoom:      13
    });

    // ── Layer state ───────────────────────────────────────────────
    const state = {
      sandy: true, flood: true,
      industrial: true, residential: true, commercial: true
    };

    const LAYER = {
      sandy:       'sandy-layer',
      flood:       'flood-layer',
      industrial:  'lu-industrial',
      residential: 'lu-residential',
      commercial:  'lu-commercial'
    };

    // NYC PLUTO land use codes (zero-padded two-digit strings)
    const CAT_FIELD = 'LandUse';
    const CODES = {
      industrial:  ['06', '07'],
      residential: ['01', '02', '03', '04'],
      commercial:  ['05']
    };

    function filterExpr(field, codes) {
      return ['match', ['get', field], codes, true, false];
    }

    // ── Load + build layers ───────────────────────────────────────
    map.on('load', () => {
      Promise.all([
        fetch('data/red%20hook-landuse.geojson').then(r => r.json()),
        fetch('data/nyc-sand%20inundation.geojson').then(r => r.json()),
        fetch('data/future%20floodplan.geojson').then(r => r.json())
      ]).then(([landuse, sandy, flood]) => {

        // Sources
        map.addSource('flood-src',   { type: 'geojson', data: flood   });
        map.addSource('sandy-src',   { type: 'geojson', data: sandy   });
        map.addSource('lu-src',      { type: 'geojson', data: landuse });

        // 1. Floodplain 2050s — bottom
        map.addLayer({
          id: LAYER.flood, type: 'fill', source: 'flood-src',
          paint: {
            'fill-color':         '#3A5F8A',
            'fill-opacity':        0.35,
            'fill-outline-color': 'rgba(58,95,138,0.6)'
          }
        });

        // 2. Sandy Inundation — middle
        map.addLayer({
          id: LAYER.sandy, type: 'fill', source: 'sandy-src',
          paint: {
            'fill-color':         '#4A7FA8',
            'fill-opacity':        0.5,
            'fill-outline-color': 'rgba(74,127,168,0.7)'
          }
        });

        // 3–5. Land Use — top (three filterable sub-layers)
        map.addLayer({
          id: LAYER.industrial, type: 'fill', source: 'lu-src',
          filter: filterExpr(CAT_FIELD, CODES.industrial),
          paint: { 'fill-color': '#8B3A2B', 'fill-opacity': 0.65 }
        });

        map.addLayer({
          id: LAYER.residential, type: 'fill', source: 'lu-src',
          filter: filterExpr(CAT_FIELD, CODES.residential),
          paint: { 'fill-color': '#8B7B2B', 'fill-opacity': 0.65 }
        });

        map.addLayer({
          id: LAYER.commercial, type: 'fill', source: 'lu-src',
          filter: filterExpr(CAT_FIELD, CODES.commercial),
          paint: { 'fill-color': '#5B3A8B', 'fill-opacity': 0.65 }
        });

        initToggles();
        initTooltip();

      }).catch(err => console.error('[red-hook-map]', err));
    });

    // ── Toggles ───────────────────────────────────────────────────
    function initToggles() {
      document.querySelectorAll('.toggle-row').forEach(row => {
        row.addEventListener('click', () => {
          const key = row.dataset.key;
          state[key] = !state[key];
          map.setLayoutProperty(LAYER[key], 'visibility',
            state[key] ? 'visible' : 'none');
          row.classList.toggle('inactive', !state[key]);
        });
      });
    }

    // ── Tooltip ───────────────────────────────────────────────────
    const tooltip  = document.getElementById('tooltip');
    const tipTitle = document.getElementById('tip-title');
    const tipBody  = document.getElementById('tip-body');

    function initTooltip() {
      map.on('mousemove', e => {
        const pt   = e.point;
        const indF = state.industrial  ? map.queryRenderedFeatures(pt, { layers: [LAYER.industrial]  }) : [];
        const resF = state.residential ? map.queryRenderedFeatures(pt, { layers: [LAYER.residential] }) : [];
        const comF = state.commercial  ? map.queryRenderedFeatures(pt, { layers: [LAYER.commercial]  }) : [];
        const sndF = state.sandy       ? map.queryRenderedFeatures(pt, { layers: [LAYER.sandy]       }) : [];
        const fldF = state.flood       ? map.queryRenderedFeatures(pt, { layers: [LAYER.flood]       }) : [];

        if (!indF.length && !resF.length && !comF.length && !sndF.length && !fldF.length) {
          tooltip.style.opacity = '0';
          return;
        }

        // Title: land use type(s)
        const uses = [];
        if (indF.length) uses.push('Industrial');
        if (resF.length) uses.push('Residential');
        if (comF.length) uses.push('Commercial');
        tipTitle.textContent = uses.length ? uses.join(' · ') : 'Red Hook';

        // Body: flood exposure
        const flood = [];
        if (sndF.length) flood.push('Sandy inundation zone');
        if (fldF.length) flood.push('Floodplain 2050s');
        tipBody.textContent = flood.length ? flood.join('\n') : 'No flood exposure mapped';

        tooltip.style.opacity = '1';
        tooltip.style.left    = (e.originalEvent.clientX + 14) + 'px';
        tooltip.style.top     = (e.originalEvent.clientY  - 10) + 'px';
      });

      map.getCanvas().addEventListener('mouseleave', () => {
        tooltip.style.opacity = '0';
      });
    }
  </script>
</body>
</html>
